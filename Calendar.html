<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar View</title>
    <style>
        :root {
            --primary: #2D5BFF;
            --primary-dark: #1E3FCC;
            --primary-light: #E8EFFF;
            --accent: #FF6B35;
            --accent-light: #FFE5DD;
            --bg-main: #FAFBFC;
            --bg-card: #FFFFFF;
            --text-primary: #1A1F36;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --border-hover: #D1D5DB;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .calendar-wrapper {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .calendar-header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .view-toggle {
            display: flex;
            background: var(--bg-main);
            border-radius: 8px;
            padding: 4px;
            gap: 4px;
        }

        .view-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn:hover {
            color: var(--text-primary);
        }

        .view-btn.active {
            background: var(--bg-card);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .current-period {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 200px;
            text-align: center;
        }

        .today-btn {
            padding: 8px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .today-btn:hover {
            background: var(--primary-dark);
        }

        .calendar-container {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            min-height: 500px;
        }

        .calendar-view {
            display: none;
        }

        .calendar-view.active {
            display: block;
        }

        /* Month View */
        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .weekday {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            padding: 8px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            min-height: 100px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-main);
        }

        .day-cell:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .day-cell.today {
            border: 2px solid var(--primary);
            background: var(--primary-light);
        }

        .day-cell.other-month {
            opacity: 0.4;
        }

        .day-number {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .day-cell.today .day-number {
            color: var(--primary);
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-item {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid;
            background: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-item:hover {
            transform: translateX(4px);
        }

        /* Week View */
        .week-grid {
            display: grid;
            grid-template-columns: 60px 1fr;
        }

        .time-column {
            border-right: 2px solid var(--border);
        }

        .time-header {
            height: 50px;
            border-bottom: 2px solid var(--border);
        }

        .time-slots {
            display: flex;
            flex-direction: column;
        }

        .time-slot {
            height: 60px;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
        }

        .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            position: relative;
        }

        .week-day-column {
            border-right: 1px solid var(--border);
        }

        .week-day-column:last-child {
            border-right: none;
        }

        .week-day-header {
            height: 50px;
            padding: 8px;
            border-bottom: 2px solid var(--border);
            text-align: center;
        }

        .week-day-header.today {
            background: var(--primary-light);
        }

        .week-day-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .week-day-number {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .week-day-header.today .week-day-name,
        .week-day-header.today .week-day-number {
            color: var(--primary);
        }

        .week-day-slots {
            position: relative;
            height: 1440px;
        }

        .hour-slot {
            height: 60px;
            border-bottom: 1px solid var(--border);
        }

        .hour-slot:nth-child(even) {
            background: var(--bg-main);
        }

        .week-event {
            position: absolute;
            left: 4px;
            right: 4px;
            padding: 6px;
            border-radius: 6px;
            border-left: 4px solid;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .week-event:hover {
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .event-title {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            position: relative;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-main);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .modal-close:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-main);
            border-radius: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .detail-value {
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .days-grid {
                gap: 4px;
            }

            .day-cell {
                min-height: 80px;
                padding: 6px;
            }

            .week-grid {
                grid-template-columns: 50px 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-wrapper">
        <div class="calendar-header">
            <div class="header-controls">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                </div>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" id="prevBtn">←</button>
            <h2 class="current-period" id="currentPeriod"></h2>
            <button class="nav-btn" id="nextBtn">→</button>
            <button class="today-btn" id="todayBtn">Today</button>
        </div>

        <div class="calendar-container">
            <div id="monthView" class="calendar-view active">
                <div class="weekday-header">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>
                <div class="days-grid" id="monthGrid"></div>
            </div>

            <div id="weekView" class="calendar-view">
                <div class="week-grid">
                    <div class="time-column">
                        <div class="time-header"></div>
                        <div class="time-slots" id="timeSlots"></div>
                    </div>
                    <div class="week-days" id="weekDays"></div>
                </div>
            </div>
        </div>

        <div class="modal" id="eventModal">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close" id="closeModal">×</button>
                <div id="eventDetail"></div>
            </div>
        </div>
    </div>

    <script>
        // Calendar configuration
        const CalendarConfig = {
            apiEndpoint: '/api/reservations', // Change this to your API endpoint
            currentDate: new Date(),
            view: 'month',
            events: []
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
            loadEvents();
        });

        function initEventListeners() {
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => switchView(btn.dataset.view));
            });

            document.getElementById('prevBtn').addEventListener('click', navigatePrevious);
            document.getElementById('nextBtn').addEventListener('click', navigateNext);
            document.getElementById('todayBtn').addEventListener('click', navigateToday);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.querySelector('.modal-overlay').addEventListener('click', closeModal);
        }

        function switchView(view) {
            CalendarConfig.view = view;
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            document.querySelectorAll('.calendar-view').forEach(v => {
                v.classList.toggle('active', v.id === `${view}View`);
            });
            view === 'month' ? renderMonthView() : renderWeekView();
        }

        function navigatePrevious() {
            if (CalendarConfig.view === 'month') {
                CalendarConfig.currentDate.setMonth(CalendarConfig.currentDate.getMonth() - 1);
                renderMonthView();
            } else {
                CalendarConfig.currentDate.setDate(CalendarConfig.currentDate.getDate() - 7);
                renderWeekView();
            }
        }

        function navigateNext() {
            if (CalendarConfig.view === 'month') {
                CalendarConfig.currentDate.setMonth(CalendarConfig.currentDate.getMonth() + 1);
                renderMonthView();
            } else {
                CalendarConfig.currentDate.setDate(CalendarConfig.currentDate.getDate() + 7);
                renderWeekView();
            }
        }

        function navigateToday() {
            CalendarConfig.currentDate = new Date();
            CalendarConfig.view === 'month' ? renderMonthView() : renderWeekView();
        }

        async function loadEvents() {
            try {
                const response = await fetch(CalendarConfig.apiEndpoint);
                CalendarConfig.events = await response.json();
                CalendarConfig.view === 'month' ? renderMonthView() : renderWeekView();
            } catch (error) {
                console.error('Error loading events:', error);
                CalendarConfig.events = [];
                CalendarConfig.view === 'month' ? renderMonthView() : renderWeekView();
            }
        }

        function renderMonthView() {
            const year = CalendarConfig.currentDate.getFullYear();
            const month = CalendarConfig.currentDate.getMonth();
            
            document.getElementById('currentPeriod').textContent = 
                CalendarConfig.currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());
            const endDate = new Date(lastDay);
            endDate.setDate(endDate.getDate() + (6 - lastDay.getDay()));
            
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';
            
            const current = new Date(startDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            while (current <= endDate) {
                const dayCell = createDayCell(new Date(current), month, today);
                grid.appendChild(dayCell);
                current.setDate(current.getDate() + 1);
            }
        }

        function createDayCell(date, currentMonth, today) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            if (date.getMonth() !== currentMonth) cell.classList.add('other-month');
            if (date.getTime() === today.getTime()) cell.classList.add('today');
            
            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = date.getDate();
            cell.appendChild(dayNumber);
            
            const eventsDiv = document.createElement('div');
            eventsDiv.className = 'day-events';
            
            getEventsForDate(date).forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = 'event-item';
                eventEl.style.borderLeftColor = event.color || '#2D5BFF';
                eventEl.textContent = event.title || 'Untitled Event';
                eventEl.addEventListener('click', () => showEventDetail(event));
                eventsDiv.appendChild(eventEl);
            });
            
            cell.appendChild(eventsDiv);
            return cell;
        }

        function renderWeekView() {
            const weekStart = getWeekStart(CalendarConfig.currentDate);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('currentPeriod').textContent = 
                `${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            
            renderTimeSlots();
            renderWeekDays(weekStart);
        }

        function renderTimeSlots() {
            const timeSlotsDiv = document.getElementById('timeSlots');
            timeSlotsDiv.innerHTML = '';
            
            for (let hour = 0; hour < 24; hour++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.textContent = formatHour(hour);
                timeSlotsDiv.appendChild(slot);
            }
        }

        function renderWeekDays(weekStart) {
            const weekDaysDiv = document.getElementById('weekDays');
            weekDaysDiv.innerHTML = '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(date.getDate() + i);
                weekDaysDiv.appendChild(createWeekDayColumn(date, today));
            }
        }

        function createWeekDayColumn(date, today) {
            const column = document.createElement('div');
            column.className = 'week-day-column';
            
            const header = document.createElement('div');
            header.className = 'week-day-header';
            if (date.getTime() === today.getTime()) header.classList.add('today');
            
            const dayName = document.createElement('div');
            dayName.className = 'week-day-name';
            dayName.textContent = date.toLocaleDateString('en-US', { weekday: 'short' });
            header.appendChild(dayName);
            
            const dayNumber = document.createElement('div');
            dayNumber.className = 'week-day-number';
            dayNumber.textContent = date.getDate();
            header.appendChild(dayNumber);
            
            column.appendChild(header);
            
            const slotsDiv = document.createElement('div');
            slotsDiv.className = 'week-day-slots';
            
            for (let hour = 0; hour < 24; hour++) {
                const slot = document.createElement('div');
                slot.className = 'hour-slot';
                slotsDiv.appendChild(slot);
            }
            
            getEventsForDate(date).forEach(event => {
                slotsDiv.appendChild(createWeekEvent(event));
            });
            
            column.appendChild(slotsDiv);
            return column;
        }

        function createWeekEvent(event) {
            const div = document.createElement('div');
            div.className = 'week-event';
            div.style.borderLeftColor = event.color || '#2D5BFF';
            
            const start = new Date(event.start);
            const end = new Date(event.end);
            
            const startMinutes = start.getHours() * 60 + start.getMinutes();
            const endMinutes = end.getHours() * 60 + end.getMinutes();
            const durationMinutes = endMinutes - startMinutes;
            
            div.style.top = `${startMinutes}px`;
            div.style.height = `${Math.max(durationMinutes, 30)}px`;
            
            const title = document.createElement('div');
            title.className = 'event-title';
            title.textContent = event.title || 'Untitled Event';
            div.appendChild(title);
            
            const time = document.createElement('div');
            time.className = 'event-time';
            time.textContent = `${formatTime(start)} - ${formatTime(end)}`;
            div.appendChild(time);
            
            div.addEventListener('click', () => showEventDetail(event));
            return div;
        }

        function getEventsForDate(date) {
            const dateStr = date.toISOString().split('T')[0];
            return CalendarConfig.events.filter(event => {
                const eventDate = new Date(event.start).toISOString().split('T')[0];
                return eventDate === dateStr;
            });
        }

        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            d.setDate(d.getDate() - day);
            return d;
        }

        function formatHour(hour) {
            if (hour === 0) return '12 AM';
            if (hour === 12) return '12 PM';
            return hour < 12 ? `${hour} AM` : `${hour - 12} PM`;
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function showEventDetail(event) {
            const modal = document.getElementById('eventModal');
            const detail = document.getElementById('eventDetail');
            
            const start = new Date(event.start);
            const end = new Date(event.end);
            
            detail.innerHTML = `
                <h3 class="modal-title">${event.title || 'Untitled Event'}</h3>
                <div class="modal-details">
                    <div class="detail-row">
                        <span class="detail-label">Date:</span>
                        <span class="detail-value">${start.toLocaleDateString('en-US', { 
                            weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' 
                        })}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Time:</span>
                        <span class="detail-value">${formatTime(start)} - ${formatTime(end)}</span>
                    </div>
                    ${event.description ? `
                        <div class="detail-row">
                            <span class="detail-label">Description:</span>
                            <span class="detail-value">${event.description}</span>
                        </div>
                    ` : ''}
                    ${Object.keys(event).filter(key => 
                        !['id', 'title', 'start', 'end', 'description', 'color'].includes(key)
                    ).map(key => `
                        <div class="detail-row">
                            <span class="detail-label">${key}:</span>
                            <span class="detail-value">${event[key]}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        // Expose API for external use
        window.CalendarAPI = {
            loadEvents: loadEvents,
            setApiEndpoint: (endpoint) => { CalendarConfig.apiEndpoint = endpoint; },
            setEvents: (events) => { 
                CalendarConfig.events = events;
                CalendarConfig.view === 'month' ? renderMonthView() : renderWeekView();
            },
            getEvents: () => CalendarConfig.events,
            goToDate: (date) => {
                CalendarConfig.currentDate = new Date(date);
                CalendarConfig.view === 'month' ? renderMonthView() : renderWeekView();
            },
            getCurrentView: () => CalendarConfig.view
        };
    </script>
</body>
</html>
